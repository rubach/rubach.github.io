<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Random Team Chooser</title>
    <meta name="description" content="Randomly pick teams for games like Tecmo Super Bowl with a retro 80s slot machine style.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cabinet">
        <div class="screen-bezel">
            <div class="screen">
                <!-- Setup View -->
                <div id="setup-view" class="view active">
                    <h1>Team Chooser</h1>
                    
                    <div class="form-group">
                        <label for="num-players">Number of Players (1-28)</label>
                        <input type="number" id="num-players" min="1" max="28" value="2">
                    </div>

                    <div id="player-names-container" class="form-group scrollable">
                        <!-- Dynamic fields will go here -->
                    </div>

                    <div class="form-group">
                        <label for="game-select">Select Game</label>
                        <select id="game-select">
                            <!-- Populated by JS -->
                        </select>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="allow-duplicates">
                        <label for="allow-duplicates" class="checkbox-label">Allow Duplicate Teams</label>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="exclude-teams-toggle">
                        <label for="exclude-teams-toggle" class="checkbox-label">Exclude Teams?</label>
                    </div>

                    <div id="exclude-teams-container" class="form-group hidden scrollable custom-scrollbar">
                        <!-- Populated by JS -->
                    </div>

                    <button id="start-btn" class="arcade-btn">Insert Coin to Start</button>
                    <div id="setup-error" class="error hidden"></div>
                </div>

                <!-- Spin View -->
                <div id="spin-view" class="view hidden">
                    <h2 id="current-player-name">Player 1</h2>
                    <p class="instruction blink">Tap screen to spin!</p>
                    <div class="slot-machine">
                        <div class="slot-window">
                            <div id="slot-reel" class="slot-reel">
                                <!-- Items go here -->
                            </div>
                            <div class="slot-overlay"></div>
                        </div>
                    </div>
                </div>

                <!-- Summary View -->
                <div id="summary-view" class="view hidden">
                    <h2>Results</h2>
                    <div id="results-list" class="scrollable custom-scrollbar">
                        <!-- Results go here -->
                    </div>
                    <button id="reset-btn" class="arcade-btn">Play Again</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
